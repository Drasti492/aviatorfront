<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator — Fly & Win</title>

<link rel="stylesheet" href="./aviator.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">AVIA<span>TOR</span></div>

    <div class="topbar-right">
      <div class="balance-chip" id="top-balance" style="display:none">
        <span class="lbl">Balance</span>
        <span id="top-bal-val">KES 0</span>
      </div>

      <button class="btn-icon" id="btn-logout" style="display:none" onclick="logout()">Logout</button>

      <button class="btn-auth" onclick="openModal('login-modal')">Sign In</button>
      <button class="btn-auth" onclick="openModal('register-modal')">Sign Up</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div style="display:flex;flex-direction:column;gap:12px">

      <!-- SKY -->
      <div id="sky">
        <div id="plane-el">✈️</div>

        <div id="mult-display">
          <div class="mult-num" id="mult-el">1.00x</div>
          <div class="mult-phase" id="phase-el">Waiting...</div>
        </div>

        <div id="crash-overlay">
          <div class="ct">CRASHED</div>
          <div class="cs" id="crash-cs">at 2.50x</div>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="feed-wrap">
        <div class="feed-title">My Transactions</div>
        <div id="history-list"></div>
      </div>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- WALLET -->
      <div class="card">
        <div class="card-title">My Wallet</div>

        <div class="wallet-bal" id="wallet-bal">KES 0</div>

        <div class="wallet-btns">
          <button class="w-btn dep" onclick="openModal('deposit-modal')" disabled>Deposit</button>
          <button class="w-btn wth" onclick="openModal('withdraw-modal')" disabled>Withdraw</button>
        </div>
      </div>

      <!-- BET -->
      <div class="card">
        <div class="card-title">Bet Controls</div>

        <div class="field">
          <label>Bet amount</label>
          <input type="number" id="bet-input" value="100">
        </div>

        <div class="field">
          <label>Auto cashout</label>
          <input type="number" id="auto-input" value="2">
        </div>

        <div class="btn-row">
          <button class="btn-bet" id="btn-bet" onclick="startGame()">Bet</button>
          <button class="btn-cash" id="btn-cash" disabled onclick="cashOut()">Cash Out</button>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- LOGIN -->
<div class="modal-bg" id="login-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('login-modal')">×</button>
    <div class="modal-title">Login</div>

    <input id="login-phone" placeholder="07XXXXXXXX">
    <button onclick="startPhoneLogin()">Send OTP</button>

    <div id="login-otp" style="display:none">
      <input id="login-code" placeholder="OTP">
      <button onclick="verifyPhoneLogin()">Verify</button>
    </div>

    <div style="margin-top:10px;cursor:pointer;color:#3b82f6"
      onclick="openModal('reset-modal')">
      Forgot password?
    </div>
  </div>
</div>

<!-- REGISTER -->
<div class="modal-bg" id="register-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('register-modal')">×</button>
    <div class="modal-title">Register</div>

    <input id="reg-name" placeholder="Name">
    <input id="reg-phone" placeholder="07XXXXXXXX">

    <button onclick="startPhoneAuth()">Send OTP</button>

    <div id="otp-section" style="display:none">
      <input id="otp-code" placeholder="OTP">
      <button onclick="completeAuth()">Verify</button>
    </div>
  </div>
</div>

<!-- RESET PASSWORD -->
<div class="modal-bg" id="reset-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('reset-modal')">×</button>
    <div class="modal-title">Reset Password</div>

    <input id="reset-phone" placeholder="07XXXXXXXX">
    <button onclick="startReset()">Send OTP</button>

    <div id="reset-step2" style="display:none">
      <input id="reset-otp" placeholder="OTP">
      <input id="new-pass" placeholder="New 4-digit PIN">
      <button onclick="completeReset()">Reset</button>
    </div>
  </div>
</div>

<!-- DEPOSIT -->
<div class="modal-bg" id="deposit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('deposit-modal')">×</button>

    <div class="modal-title">Deposit</div>

    <input id="dep-phone" placeholder="2547XXXXXXXX">
    <input id="dep-amount" placeholder="Amount">

    <button onclick="doDeposit()">Pay via M-Pesa</button>
  </div>
</div>

<!-- WITHDRAW -->
<div class="modal-bg" id="withdraw-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('withdraw-modal')">×</button>

    <div class="modal-title">Withdraw</div>

    <input id="wth-amount" placeholder="Amount">

    <button onclick="confirmWithdraw()">Withdraw</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="./aviator.js"></script>
</body>
</html>
