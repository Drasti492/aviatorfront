<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator — Fly & Win</title>

<link rel="stylesheet" href="./aviator.css">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">AVIA<span>TOR</span></div>

    <div class="topbar-right">
      <div class="balance-chip" id="top-balance" style="display:none">
        <span class="lbl">Balance</span>
        <span id="top-bal-val">$0.00</span>
      </div>

      <button class="btn-icon" id="btn-logout" style="display:none" onclick="logout()">Logout</button>

      <button class="btn-auth" onclick="openModal('login-modal')">
        Sign In
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT -->
    <div style="display:flex;flex-direction:column;gap:12px">

      <!-- SKY -->
      <div id="sky">
        <div class="star-layer" id="stars-el"></div>
        <canvas id="trail-cvs"></canvas>

        <div id="plane-el">✈️</div>

        <div id="mult-display">
          <div class="mult-num" id="mult-el">1.00x</div>
          <div class="mult-phase" id="phase-el">Place a bet to start</div>
        </div>

        <div id="crash-overlay">
          <div class="ct" id="crash-ct">CRASHED</div>
          <div class="cs" id="crash-cs">at 2.50x</div>
        </div>
      </div>

      <!-- FEED -->
      <div class="feed-wrap">
        <div class="feed-title">Live activity</div>
        <div id="feed-list"></div>
      </div>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- WALLET -->
      <div class="card">
        <div class="card-title">My Wallet</div>

        <div class="wallet-bal" id="wallet-bal">$0.00</div>
        <div class="wallet-sub">Sign in to play</div>

        <div class="wallet-btns">
          <button class="w-btn dep" onclick="openDepositModal()" disabled>Deposit</button>
          <button class="w-btn wth" onclick="openWithdrawModal()" disabled>Withdraw</button>
        </div>
      </div>

      <!-- BET -->
      <div class="card">
        <div class="card-title">Bet Controls</div>

        <div class="field">
          <label>Bet amount</label>
          <input type="number" id="bet-input" value="100">
        </div>

        <div class="field">
          <label>Auto cashout</label>
          <input type="number" id="auto-input" value="2.00">
        </div>

        <div class="btn-row">
          <button class="btn-bet" onclick="startGame()">Place Bet</button>
          <button class="btn-cash" id="btn-cash" disabled onclick="cashOut()">Cash Out</button>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- ================= MODALS ================= -->

<!-- LOGIN -->
<div class="modal-bg" id="login-modal">
  <div class="modal">

    <button class="modal-close" onclick="closeModal('login-modal')">×</button>

    <div class="modal-title">Welcome back</div>

    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="login-phone">
    </div>

    <button class="btn-full blue" onclick="startPhoneLogin()">
      Send OTP
    </button>

    <!-- OTP INSIDE MODAL -->
    <div id="login-otp" style="display:none">

      <div class="field">
        <label>Enter OTP</label>
        <input type="text" id="login-code">
      </div>

      <button class="btn-full green" onclick="verifyPhoneLogin()">
        Verify & Login
      </button>

    </div>

  </div>
</div>

<!-- REGISTER -->
<div class="modal-bg" id="register-modal">
  <div class="modal">

    <button class="modal-close" onclick="closeModal('register-modal')">×</button>

    <div class="modal-title">Create account</div>

    <div class="field">
      <label>Name</label>
      <input type="text" id="reg-name">
    </div>

    <div class="field">
      <label>Phone</label>
      <input type="tel" id="reg-phone">
    </div>

    <button class="btn-full blue" onclick="startPhoneAuth()">
      Send OTP
    </button>

    <div id="otp-section" style="display:none">

      <div class="field">
        <label>OTP</label>
        <input type="text" id="otp-code">
      </div>

      <button class="btn-full green" onclick="completeAuth()">
        Verify
      </button>

    </div>

  </div>
</div>

<!-- DEPOSIT -->
<div class="modal-bg" id="deposit-modal">
  <div class="modal">

    <button class="modal-close" onclick="closeModal('deposit-modal')">×</button>

    <div class="modal-title">Deposit</div>

    <div class="field">
      <input type="tel" id="dep-phone" placeholder="Phone">
    </div>

    <div class="field">
      <input type="number" id="dep-amount" placeholder="Amount">
    </div>

    <button class="btn-full green" onclick="doDeposit()">
      Send STK
    </button>

  </div>
</div>

<!-- WITHDRAW -->
<div class="modal-bg" id="withdraw-modal">
  <div class="modal">

    <button class="modal-close" onclick="closeModal('withdraw-modal')">×</button>

    <div class="modal-title">Withdraw</div>

    <div class="field">
      <input type="tel" id="wth-phone">
    </div>

    <div class="field">
      <input type="number" id="wth-amount">
    </div>

    <button class="btn-full orange" onclick="confirmWithdraw()">
      Withdraw
    </button>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- SCRIPTS -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script type="module" src="./firebase.js"></script>
<script type="module" src="./auth.js"></script>
<script type="module" src="./aviator.js"></script>

</body>
</html>
